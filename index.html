<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Adoção de cãeszinhos!</title>
</head>

<body>

    <div class="formulario">
        
        <form>
            <h1>Formulário para adoção</h1>
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome">
            <br>
            <label for="e-mail">e-mail:</label>
            <input type="text" id="e-mail">
            <br>
            <label for="Telefone">Telefone:</label>
            <input type="tel" id="Telefone">
            <br>
            <label for="CPF">CPF:</label>
            <input type="text" id="CPF">
            <br>
            <label for="idade">Idade:</label>
            <input type="number" id="idade">
            <br>
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade">
            <br>
            <label for="moradia">Tipo de moradia(casa ou apartamento):</label>
            <input type="text" id="moradia">
            <br>
            <label for="quintal">Possui quintal? (sim ou não):</label>
            <input type="text" id="quintal">
            <br>
            <label for="expet">Já teve pet antes? (sim ou não)</label>
            <input type="text" id="expet">
            <br>
            <label for="horas">Quantas horas o animal ficará sozinho por dia?:</label>
            <input type="number" id="horas">
            <br>
            <label for="motivo">Motivo da adoção:</label>
            <input type="text" id="motivo">
            <br>
            <label for="termo">Aceite o termo de responsabilidade:</label>
        </form>

    </div>

</body>

</html>
